<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SJF Process Scheduler</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0b0e14;
    --surface: #131720;
    --surface2: #1a2030;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #e8eaf0;
    --text-muted: #6b7280;
    --text-dim: #9ca3af;
    --accent: #4ade80;
    --accent-dim: rgba(74,222,128,0.12);
    --accent-glow: rgba(74,222,128,0.25);
    --danger: #f87171;
    --warn: #fbbf24;
    --info: #60a5fa;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 40px 20px 80px;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -20%, rgba(74,222,128,0.06) 0%, transparent 70%),
      radial-gradient(ellipse 40% 30% at 90% 10%, rgba(96,165,250,0.04) 0%, transparent 60%);
  }

  .container { max-width: 900px; margin: 0 auto; }

  header {
    display: flex; align-items: flex-start; justify-content: space-between;
    margin-bottom: 40px; flex-wrap: wrap; gap: 16px;
  }
  .title-block h1 {
    font-family: var(--mono);
    font-size: clamp(22px, 4vw, 32px);
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
    line-height: 1.1;
  }
  .title-block h1 span { color: var(--accent); }
  .title-block p { color: var(--text-muted); font-size: 13px; margin-top: 6px; }
  .mode-switch {
    display: flex; gap: 2px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px; padding: 3px;
  }
  .mode-btn {
    padding: 7px 16px; border-radius: 8px; border: none;
    font-family: var(--sans); font-size: 13px; font-weight: 500;
    cursor: pointer; color: var(--text-muted); background: transparent;
    transition: all 0.18s;
  }
  .mode-btn.active {
    background: var(--surface2);
    color: var(--accent);
    border: 1px solid rgba(74,222,128,0.25);
  }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
  @media(max-width:600px) { .grid { grid-template-columns: 1fr; } }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
  }
  .card-title {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .card-title::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  /* Process table */
  .proc-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .proc-table th {
    text-align: left; padding: 6px 8px;
    color: var(--text-muted); font-weight: 500; font-size: 11px;
    border-bottom: 1px solid var(--border);
  }
  .proc-table td { padding: 8px 8px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .proc-table tr:last-child td { border-bottom: none; }
  .proc-table tr { transition: background 0.15s; }
  .proc-table tr:hover td { background: rgba(255,255,255,0.02); }

  .pid-badge {
    font-family: var(--mono); font-size: 11px; font-weight: 700;
    padding: 3px 8px; border-radius: 6px;
    display: inline-block;
  }
  .del-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text-muted); font-size: 16px; line-height: 1;
    padding: 2px 6px; border-radius: 4px; transition: all 0.15s;
  }
  .del-btn:hover { color: var(--danger); background: rgba(248,113,113,0.1); }

  /* Add process */
  .add-form { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; margin-top: 16px; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 11px; color: var(--text-muted); font-weight: 500; }
  .field input[type=number] {
    width: 80px; padding: 8px 10px;
    background: var(--surface2); border: 1px solid var(--border2);
    border-radius: 8px; color: var(--text);
    font-family: var(--mono); font-size: 13px;
    outline: none; transition: border 0.15s;
    -moz-appearance: textfield;
  }
  .field input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
  .field input[type=number]:focus { border-color: rgba(74,222,128,0.5); }

  .btn {
    padding: 8px 18px; border-radius: 8px; font-family: var(--sans);
    font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid var(--border2);
    background: var(--surface2); color: var(--text);
    transition: all 0.15s; white-space: nowrap;
  }
  .btn:hover { border-color: rgba(74,222,128,0.35); color: var(--accent); }
  .btn-run {
    padding: 10px 28px; background: var(--accent-dim);
    border: 1px solid rgba(74,222,128,0.35);
    color: var(--accent); font-size: 14px; font-weight: 600;
    border-radius: 10px; cursor: pointer; font-family: var(--sans);
    transition: all 0.2s; letter-spacing: 0.01em;
  }
  .btn-run:hover {
    background: var(--accent-glow);
    box-shadow: 0 0 20px rgba(74,222,128,0.2);
  }

  /* Gantt */
  #results { display: none; animation: fadeUp 0.4s ease; }
  @keyframes fadeUp { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform: translateY(0); } }

  .gantt-outer {
    overflow-x: auto; padding-bottom: 8px;
    scrollbar-width: thin; scrollbar-color: var(--border2) transparent;
  }
  .gantt-inner { min-width: 500px; }
  .gantt-row { display: flex; gap: 2px; align-items: stretch; }
  .gantt-block {
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-size: 11px; font-weight: 700;
    border-radius: 6px; height: 44px; flex-shrink: 0;
    transition: transform 0.15s, filter 0.15s;
    cursor: default; position: relative;
  }
  .gantt-block:hover { transform: scaleY(1.08); filter: brightness(1.15); }
  .gantt-block.idle {
    background: var(--surface2); color: var(--text-muted);
    border: 1px dashed var(--border2);
  }
  .gantt-ticks { display: flex; gap: 2px; margin-top: 6px; }
  .gantt-tick {
    font-family: var(--mono); font-size: 10px; color: var(--text-muted);
    display: flex; align-items: center; justify-content: flex-start;
    flex-shrink: 0; padding-left: 2px;
  }

  .step-nav { display: flex; gap: 8px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
  .step-nav .btn { padding: 6px 14px; font-size: 12px; }
  .step-nav .btn:disabled { opacity: 0.3; cursor: default; }
  .step-label {
    font-family: var(--mono); font-size: 12px; color: var(--text-muted);
    background: var(--surface2); border: 1px solid var(--border);
    padding: 5px 12px; border-radius: 6px;
  }
  #event-log {
    font-family: var(--mono); font-size: 12px; color: var(--accent);
    background: var(--accent-dim); border: 1px solid rgba(74,222,128,0.2);
    border-radius: 8px; padding: 10px 14px; margin-top: 10px;
    min-height: 36px; transition: all 0.2s;
  }

  /* Metrics */
  .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  @media(max-width:480px) { .metrics { grid-template-columns: 1fr 1fr; } }
  .metric {
    background: var(--surface2); border-radius: 10px;
    padding: 14px 16px; border: 1px solid var(--border);
  }
  .metric .mlabel { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; }
  .metric .mval { font-family: var(--mono); font-size: 24px; font-weight: 700; color: var(--accent); }
  .metric .munit { font-size: 12px; color: var(--text-muted); }

  /* Stats table */
  .stats-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .stats-table th {
    text-align: left; padding: 8px 10px;
    color: var(--text-muted); font-weight: 500; font-size: 11px;
    border-bottom: 1px solid var(--border);
    font-family: var(--mono);
  }
  .stats-table td { padding: 9px 10px; border-bottom: 1px solid var(--border); }
  .stats-table tr:last-child td { border-bottom: none; }
  .stats-table tr:hover td { background: rgba(255,255,255,0.02); }
  .num { font-family: var(--mono); font-size: 13px; }
  .best { color: var(--accent); font-weight: 700; }

  .legend { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-dim); }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }

  .progress-bar-wrap { width: 100%; height: 4px; background: var(--border); border-radius: 2px; margin: 12px 0 0; }
  .progress-bar { height: 4px; background: var(--accent); border-radius: 2px; transition: width 0.4s ease; }

  .tag { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; font-family: var(--mono); }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="title-block">
      <h1>SJF <span>Scheduler</span></h1>
      <p>Shortest Job First · Process Scheduling Simulation</p>
    </div>
    <div class="mode-switch">
      <button class="mode-btn active" id="btn-nonp" onclick="setMode('non-preemptive')">Non-preemptive</button>
      <button class="mode-btn" id="btn-pre" onclick="setMode('preemptive')">Preemptive (SRTF)</button>
    </div>
  </header>

  <div class="grid">
    <!-- Process List -->
    <div class="card" style="grid-column: 1 / -1;">
      <div class="card-title">Process queue</div>
      <table class="proc-table">
        <thead><tr>
          <th>PID</th><th>Arrival time</th><th>Burst time</th><th></th>
        </tr></thead>
        <tbody id="proc-body"></tbody>
      </table>
      <div class="add-form">
        <div class="field">
          <label>Arrival time</label>
          <input type="number" id="in-arrival" value="0" min="0" max="50"/>
        </div>
        <div class="field">
          <label>Burst time</label>
          <input type="number" id="in-burst" value="4" min="1" max="30"/>
        </div>
        <div class="field" style="justify-content:flex-end;">
          <button class="btn" onclick="addProcess()">+ Add process</button>
        </div>
        <div class="field" style="justify-content:flex-end;margin-left:auto;">
          <button class="btn-run" onclick="runSimulation()">▶ Run simulation</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Results -->
  <div id="results">
    <!-- Gantt -->
    <div class="card" style="margin-bottom:16px;">
      <div class="card-title">Gantt chart</div>
      <div class="step-nav">
        <button class="btn" id="btn-prev" onclick="stepBack()">← Prev</button>
        <button class="btn" id="btn-next" onclick="stepForward()">Next →</button>
        <button class="btn" id="btn-play" onclick="togglePlay()">▶ Play</button>
        <span class="step-label" id="step-info">Step 1 / 1</span>
        <button class="btn" onclick="resetSteps()">↺ Reset</button>
      </div>
      <div id="legend" class="legend"></div>
      <div class="gantt-outer">
        <div class="gantt-inner">
          <div class="gantt-row" id="gantt-row"></div>
          <div class="gantt-ticks" id="gantt-ticks"></div>
        </div>
      </div>
      <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>
      <div id="event-log"></div>
    </div>

    <!-- Metrics -->
    <div class="card" style="margin-bottom:16px;">
      <div class="card-title">Performance metrics</div>
      <div class="metrics">
        <div class="metric"><div class="mlabel">Avg waiting time</div><div class="mval" id="m-awt">—</div><div class="munit">units</div></div>
        <div class="metric"><div class="mlabel">Avg turnaround time</div><div class="mval" id="m-att">—</div><div class="munit">units</div></div>
        <div class="metric"><div class="mlabel">CPU utilization</div><div class="mval" id="m-cpu">—</div><div class="munit">percent</div></div>
      </div>
    </div>

    <!-- Stats table -->
    <div class="card">
      <div class="card-title">Per-process statistics</div>
      <table class="stats-table">
        <thead><tr>
          <th>PID</th><th>Arrival</th><th>Burst</th>
          <th>Start</th><th>Finish</th><th>Waiting</th><th>Turnaround</th>
        </tr></thead>
        <tbody id="stats-body"></tbody>
      </table>
    </div>
  </div>

</div>

<script>
const PALETTE = [
  {bg:'#4ade80', text:'#052e16'},
  {bg:'#60a5fa', text:'#0c1a35'},
  {bg:'#f472b6', text:'#3b0a22'},
  {bg:'#fb923c', text:'#3a1600'},
  {bg:'#a78bfa', text:'#1e0a45'},
  {bg:'#34d399', text:'#022b20'},
  {bg:'#fbbf24', text:'#3a2000'},
  {bg:'#e879f9', text:'#350045'},
];

let processes = [
  {id:'P1', arrival:0, burst:6},
  {id:'P2', arrival:1, burst:2},
  {id:'P3', arrival:3, burst:8},
  {id:'P4', arrival:4, burst:3},
];
let mode = 'non-preemptive';
let schedule = [];
let stats = [];
let currentStep = 0;
let playTimer = null;

function setMode(m) {
  mode = m;
  document.getElementById('btn-nonp').classList.toggle('active', m==='non-preemptive');
  document.getElementById('btn-pre').classList.toggle('active', m==='preemptive');
}

function colorFor(pid) {
  const idx = processes.findIndex(p => p.id === pid);
  return idx >= 0 ? PALETTE[idx % PALETTE.length] : {bg:'#374151',text:'#9ca3af'};
}

function renderTable() {
  const tbody = document.getElementById('proc-body');
  tbody.innerHTML = '';
  processes.forEach((p, i) => {
    const c = PALETTE[i % PALETTE.length];
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><span class="pid-badge" style="background:${c.bg};color:${c.text}">${p.id}</span></td>
      <td class="num">${p.arrival}</td>
      <td class="num">${p.burst}</td>
      <td><button class="del-btn" onclick="removeProcess(${i})">×</button></td>`;
    tbody.appendChild(tr);
  });
}

function addProcess() {
  const a = Math.max(0, parseInt(document.getElementById('in-arrival').value)||0);
  const b = Math.max(1, parseInt(document.getElementById('in-burst').value)||1);
  const pid = 'P' + (processes.length + 1);
  processes.push({id:pid, arrival:a, burst:b});
  renderTable();
}

function removeProcess(i) {
  processes.splice(i,1);
  processes.forEach((p,j) => p.id = 'P'+(j+1));
  renderTable();
  document.getElementById('results').style.display='none';
}

function simulateNonPreemptive() {
  const jobs = processes.map(p=>({...p}));
  const done = {}, segs = [];
  let t = 0, count = 0;
  while(count < jobs.length) {
    const avail = jobs.filter(j => j.arrival<=t && !done[j.id]);
    if(!avail.length) {
      const next = jobs.filter(j=>!done[j.id]).sort((a,b)=>a.arrival-b.arrival)[0];
      if(next) segs.push({id:'idle',start:t,end:next.arrival}), t=next.arrival;
      continue;
    }
    avail.sort((a,b)=>a.burst-b.burst||a.arrival-b.arrival);
    const job = avail[0];
    segs.push({id:job.id,start:t,end:t+job.burst});
    done[job.id]={start:t,end:t+job.burst};
    t+=job.burst; count++;
  }
  return {segs, done};
}

function simulatePreemptive() {
  const jobs = processes.map(p=>({...p, remaining:p.burst, startTime:null}));
  let t=0, done={}, segs=[];
  const total = processes.reduce((s,p)=>s+p.burst,0) + Math.max(...processes.map(p=>p.arrival)) + 2;
  let count = 0;
  while(count < jobs.length && t < total) {
    const avail = jobs.filter(j=>j.arrival<=t && j.remaining>0);
    if(!avail.length){t++;continue;}
    avail.sort((a,b)=>a.remaining-b.remaining||a.arrival-b.arrival);
    const job = avail[0];
    if(job.startTime===null) job.startTime=t;
    const last = segs[segs.length-1];
    if(last && last.id===job.id) last.end=t+1;
    else segs.push({id:job.id,start:t,end:t+1});
    job.remaining--;
    t++;
    if(job.remaining===0){
      done[job.id]={start:job.startTime,end:t};
      count++;
    }
  }
  return {segs, done};
}

function runSimulation() {
  if(!processes.length) return;
  const {segs, done} = mode==='non-preemptive' ? simulateNonPreemptive() : simulatePreemptive();
  schedule = segs;

  stats = processes.map((p,i) => {
    const f = done[p.id]||{};
    const tat = (f.end||0)-p.arrival;
    const wt = tat-p.burst;
    return {...p, ci:i, startT:f.start||0, endT:f.end||0, tat, wt};
  });

  const avgWT = stats.reduce((s,p)=>s+p.wt,0)/stats.length;
  const avgTAT = stats.reduce((s,p)=>s+p.tat,0)/stats.length;
  const totalBurst = processes.reduce((s,p)=>s+p.burst,0);
  const totalTime = schedule.length ? schedule[schedule.length-1].end : 1;
  document.getElementById('m-awt').textContent = avgWT.toFixed(2);
  document.getElementById('m-att').textContent = avgTAT.toFixed(2);
  document.getElementById('m-cpu').textContent = (totalBurst/totalTime*100).toFixed(1)+'%';

  const tbody = document.getElementById('stats-body');
  tbody.innerHTML='';
  const minWT = Math.min(...stats.map(s=>s.wt));
  stats.forEach(p => {
    const c = PALETTE[p.ci % PALETTE.length];
    const tr = document.createElement('tr');
    tr.innerHTML=`
      <td><span class="pid-badge" style="background:${c.bg};color:${c.text}">${p.id}</span></td>
      <td class="num">${p.arrival}</td><td class="num">${p.burst}</td>
      <td class="num">${p.startT}</td><td class="num">${p.endT}</td>
      <td class="num ${p.wt===minWT?'best':''}">${p.wt}</td>
      <td class="num">${p.tat}</td>`;
    tbody.appendChild(tr);
  });

  const legend = document.getElementById('legend');
  legend.innerHTML='';
  processes.forEach((p,i)=>{
    const c=PALETTE[i%PALETTE.length];
    legend.innerHTML+=`<div class="legend-item"><div class="legend-dot" style="background:${c.bg}"></div>${p.id} (burst: ${p.burst})</div>`;
  });

  currentStep=0;
  document.getElementById('results').style.display='block';
  renderGantt(currentStep);
  updateNav();
}

function renderGantt(step) {
  const maxT = schedule.length ? schedule[schedule.length-1].end : 1;
  const visible = schedule.slice(0, step+1);
  const PX_PER_UNIT = Math.max(18, Math.min(40, 500/maxT));

  const row = document.getElementById('gantt-row');
  const ticks = document.getElementById('gantt-ticks');
  row.innerHTML=''; ticks.innerHTML='';

  visible.forEach((seg, si) => {
    const w = (seg.end-seg.start)*PX_PER_UNIT;
    const isLast = si===visible.length-1;
    const c = seg.id==='idle' ? null : colorFor(seg.id);
    const div = document.createElement('div');
    div.className = 'gantt-block' + (seg.id==='idle'?' idle':'');
    div.style.width = w+'px';
    div.style.minWidth = w+'px';
    if(c) { div.style.background=c.bg; div.style.color=c.text; }
    div.style.opacity = isLast ? '1' : '0.75';
    if(isLast) div.style.boxShadow = c ? `0 0 12px ${c.bg}55` : 'none';
    div.textContent = seg.id;
    div.title = `${seg.id}: t=${seg.start} → t=${seg.end}`;
    row.appendChild(div);
  });

  // ticks
  let tickSet = new Set();
  visible.forEach(s=>{tickSet.add(s.start);tickSet.add(s.end);});
  let lastEnd=0;
  visible.forEach(seg=>{
    const w=(seg.end-seg.start)*PX_PER_UNIT;
    const d=document.createElement('div');
    d.className='gantt-tick'; d.style.width=w+'px'; d.style.minWidth=w+'px';
    d.textContent=seg.start;
    ticks.appendChild(d);
    lastEnd=seg.end;
  });
  if(visible.length){
    const last=visible[visible.length-1];
    const d=document.createElement('div');
    d.className='gantt-tick'; d.style.minWidth='20px';
    d.textContent=last.end;
    ticks.appendChild(d);
  }

  const seg = visible[visible.length-1];
  const log = document.getElementById('event-log');
  if(seg){
    if(seg.id==='idle') log.style.color='#fbbf24', log.textContent=`▸ t=${seg.start}–${seg.end}  CPU idle — no process available`;
    else {
      const c=colorFor(seg.id);
      log.style.color=c.bg;
      log.textContent=`▸ t=${seg.start}–${seg.end}  Running ${seg.id}  (${seg.end-seg.start} unit${seg.end-seg.start>1?'s':''})`;
    }
  }

  const pct = ((step+1)/schedule.length*100).toFixed(1);
  document.getElementById('progress-bar').style.width = pct+'%';
}

function updateNav() {
  document.getElementById('step-info').textContent=`Step ${currentStep+1} / ${schedule.length}`;
  document.getElementById('btn-prev').disabled = currentStep===0;
  document.getElementById('btn-next').disabled = currentStep>=schedule.length-1;
}

function stepForward() {
  if(currentStep<schedule.length-1){ currentStep++; renderGantt(currentStep); updateNav(); }
}
function stepBack() {
  if(currentStep>0){ currentStep--; renderGantt(currentStep); updateNav(); }
}
function resetSteps() {
  currentStep=0; renderGantt(0); updateNav();
  if(playTimer){clearInterval(playTimer);playTimer=null;document.getElementById('btn-play').textContent='▶ Play';}
}
function togglePlay() {
  const btn=document.getElementById('btn-play');
  if(playTimer){clearInterval(playTimer);playTimer=null;btn.textContent='▶ Play';return;}
  btn.textContent='⏸ Pause';
  playTimer=setInterval(()=>{
    if(currentStep>=schedule.length-1){clearInterval(playTimer);playTimer=null;btn.textContent='▶ Play';return;}
    stepForward();
  },600);
}

renderTable();
</script>
